feature:
    name: personal-access-tokens
    description: Allow users to create and manage PATs, which can then be used for permissioned API ops.
    slug: PATS
    version: 1.2.1
    prerequisites:
        - Data model must be completed and tested;
        - DATA.PAT

components:
    CRUD:
        description: Create, Read, Update and Delete via API
        requirements:
            1: TODO

constraints:
    PATSEC:
        name: Personal Access Token - Hashing and Validation Rules
        requirements:
            1: The system must never persist the raw token to the database.
            2: API authentication requests must hash the incoming token and query against the token_hash column.
            3: A token is considered invalid if revoked_at is not null, or if expires_at is in the past.
