feature:
    name: feature-context
    product: api
    version: 1.0.0
    description: |
        The feature-context endpoint returns the canonical spec context for one feature in one implementation.
        It is the primary read endpoint for AI agents before making code changes.

components:
    ENDPOINT:
        description: HTTP interface
        requirements:
            1: "GET /api/v1/feature-context"
            2: Requires Authorization Bearer token header

    REQUEST:
        description: Query parameters for feature context lookup
        requirements:
            1: Requires `product_name` string
            2: Requires `feature_name` string
            3: Requires `implementation_name` string
            4: Accepts optional `include_refs` boolean, default false
            6: Accepts optional `include_deprecated` boolean, default false
            6-note: When false, deprecated ACIDs are excluded from the `acids` list

    RESOLUTION:
        description: How feature data is resolved for the selected implementation
        requirements:
            1: Resolves exactly one canonical spec for the selected feature and implementation
            2: When multiple tracked branches on the selected implementation contain that feature, the local spec with the most recent `updated_at` timestamp is the canonical spec
            3: If the implementation has no local spec for that feature, canonical spec resolution walks the parent chain within the same product and uses the nearest ancestor that does
            4: Refs are aggregated across all tracked branches for the selected implementation; if none exist for that feature, ref resolution walks the parent chain and uses the nearest ancestor implementation that has refs
            5: If multiple local specs have the same most recent `updated_at`, the canonical spec is the one with the lexicographically smallest branch name

    RESPONSE:
        description: The response shape for canonical feature context
        requirements:
            1: "On success, returns HTTP 200 with a JSON body containing a `data` object"
            2: "The `data` object includes `product_name`, `feature_name`, `implementation_name`, and `implementation_id`"
            3: "The `data` object includes `spec_source` and `refs_source` objects describing whether each section is local or inherited"
            3-1: Each source object includes `source_type` with value `local`, `inherited`, or `none`
            3-2: When `source_type` is not `none`, the source object includes `implementation_name`
            3-3: `spec_source` and `refs_source` also include `branch_names` listing the contributing tracked branches
            4: "The `data` object includes an `acids` list sorted by ACID"
            5: Each ACID entry includes `acid`, `requirement`, optional `note`, `deprecated`, and `replaced_by`
            6: Each ACID entry includes `refs_count` integer and `test_refs_count` integer
            7: When `include_refs` is true, each ACID entry includes a `refs` list and each ref includes `path`, `is_test`, `repo_uri`, and `branch_name`
            8: "The `data` object includes a `warnings` list of human-readable strings"
            9: "If the product, implementation, or feature cannot be resolved, returns HTTP 404 with an `errors` object containing a `detail` string"
            10: "On validation error, returns HTTP 422 with an `errors` object containing a `detail` string"
            11: "On auth error, returns HTTP 401 with an `errors` object containing a `detail` string"
            12: "On scope or permission error, returns HTTP 403 with an `errors` object containing a `detail` string"

constraints:
    AUTH:
        requirements:
            1: Requires a valid, non-expired, non-revoked API token
            2: Token scopes must include `impls:read`, `specs:read`, and `refs:read`
            3: All lookups are scoped to the token's team_id

    VALIDATION:
        requirements:
            1: "`product_name`, `feature_name`, and `implementation_name` are required"
            2: The endpoint is read-only and never mutates specs, refs, or implementations
