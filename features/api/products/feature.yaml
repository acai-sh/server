feature:
    name: products
    description: /products resource for listing products derived from pushed specs
    product: api

components:
    LIST:
        name: List products
        description: Retrieve all products for the authenticated team
        requirements:
            1: GET returns array of products derived from distinct feature_product values in specs table
            1-note: Under the hood, this query touches all specs in the team O(n), and aggregates on spec.feature_product
            2: Returns a list of objects containing only a name property
            3: Products are ordered alphabetically by name

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: All endpoints require valid Bearer token (rejects revoked or expired tokens)
            2: Read operations require specs:read scope
            3: All data is scoped to token's team_id
