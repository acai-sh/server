feature:
    name: implementations
    description: /implementations and /implementations/:id resources for listing and retrieving implementation details with coverage summaries
    product: api

components:
    LIST:
        name: List implementations
        description: Retrieve all implementations for the authenticated team
        requirements:
            1: GET returns array of implementations scoped to token's team_id
            2: By default, returns only active implementations (is_active=true)
            3: Accepts optional query param ?is_active=all to include soft-deleted
            4: Accepts optional query param ?spec_id=uuid to filter by spec
            5: Accepts optional query param ?feature_name=my-feature to filter by feature name
            6: Each implementation includes id, name, spec_id, spec_name, is_active, created_at, updated_at

    GET:
        name: Get implementation
        description: Retrieve a single implementation with coverage summary
        requirements:
            1: GET /:id returns implementation details
            2: Includes id, name, spec_id, spec_name, team_id, is_active, description, created_at, updated_at
            3: Includes branches(list of tracked branches)
            4: Includes last_push_at timestamp (most recent push to this implementation)
            5: Includes coverage object with total, implemented, tested, accepted counts

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: All endpoints require valid Bearer token (rejects revoked or expired tokens)
            2: Read operations require impls:read scope
            3: Token's team_id must match implementation.team_id - returns 404 if mismatch (not 403, to avoid leaking existence)
