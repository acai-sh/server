feature:
    name: push
    description: |
        REST API endpoint for pushing parsed specs, requirements, and/or code references to the acai server.

        This is the primary write endpoint for the acai CLI. It supports three workflows:

        1. Spec push - Push a parsed feature.yaml (metadata & requirements in json format).
        - Under the hood, this upserts the `specs`, `requirements`, `tracked_branches`, and `implementations` resources
        2. Reference-only push - Push code references (ACID comments) without spec, for multi-repo setups
        3. Inheritance - Create a new implementation by inheriting from an existing one (feature branch workflow)

        The endpoint is idempotent and transactional - identical payloads produce the same result, and failures
        result in complete rollbacks with no partial state.
    version: 1.0.0
    product: api

components:
    SPEC_PUSH:
        name: Spec and requirement push
        description: Pushing a feature.yaml spec with requirements, and a raw copy of the yaml for future-proofing
        requirements:
            1: If spec does not exist for (repo_uri, branch_name, path), creates it; otherwise updates it
            2: If implementation does not exist for this spec with given name, creates it (defaults to branch_name)
            3: If implementation already tracks a different branch from this repo, returns 422 with error_code=branch_conflict
            4: Otherwise, links this branch to the implementation
            5: Upserts all requirements, generating ACIDs from feature_name.group_key.local_id
            6: Operation is idempotent - identical payloads produce the same result

    REF_PUSH:
        name: Reference-only push
        description: Pushing code references without spec (common for multi-repo setups)
        requirements:
            1: Accepts request with repo_uri, branch_name, commit_hash, and code_references (no spec/requirements)
            2: If no implementations track this branch and inherit_from is provided, creates new implementation targeting parent's spec (see INHERITANCE.7)
            3: If no implementations track this branch and no inherit_from, returns implementation_id as null
            4: If ACID does not match any requirement in the implementation's spec, skips the reference and adds to summary.skipped_acids
            5: Otherwise, creates or updates the code reference for the matching requirement

    INHERITANCE:
        name: Implementation inheritance
        description: Creating a new implementation by inheriting from an existing one (for feature branch workflows)
        requirements:
            1: If inherit_from is provided and no implementation tracks this branch, creates new implementation
            2: If inherit_from implementation ID not found, returns 404
            3: New implementation name comes from request or defaults to branch_name
            4: Copies requirement statuses from source implementation - accepted reqs stay accepted, saves re-approval
            4-1: Only copies statuses for requirements that exist in BOTH specs, matched by ACID
            4-2: Requirements unique to the new spec start with null status; requirements unique to source are ignored
            5: Does not copy code_references - refs are branch-specific and will be pushed fresh by CLI
            6: "For spec push: targets the spec from request payload, inherits statuses from source"
            7: "For refs-only push: targets the same spec as source implementation, inherits statuses from source"
            8-note: |
                inherit_from serves dual purpose based on context:
                - Spec push: "I'm iterating on this feature, carry over QA progress" (only copies req statuses)
                - Refs-only push: "I'm working on a new implementation of the same spec" (inherits target spec)

    CODE_REFS:
        name: Code reference tracking
        description: Managing code references across branches and implementations
        requirements:
            1: Updates last_seen_at for existing references
            2: Creates new references for previously unseen ACID+path combinations
            3: Does not delete refs that stopped appearing - stale detection handled by last_seen_at timestamp

    RESPONSE:
        name: Push response
        description: JSON response returned after successful push
        requirements:
            1: Returns 200 OK with spec_id (null for ref-only) and implementation_id (null if no tracked branches)
            2: Includes summary object with requirements_created, requirements_updated, requirements_deprecated
            3: Includes summary.refs_added and summary.refs_skipped counts
            4: Includes summary.skipped_acids array listing ACIDs not found in any tracked spec
            5: Returns 200 OK with summary.dry_run=true when ?dry_run=true validation succeeds without persistence

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: Requires valid Bearer token (rejects revoked or expired tokens)
            2: Spec/requirements push requires specs:write scope
            3: Code references push requires refs:write scope
            4: When both spec and code_references present, requires both specs:write AND refs:write
            5: Token's team_id determines team ownership for all created/updated resources

    REQUEST_VALIDATION:
        name: Request payload validation
        requirements:
            1: Request body must contain repo_uri, branch_name, and commit_hash as non-empty strings
            2: spec object is optional; if provided, spec.parsed_feature.name and spec.path are required
            2-1: spec.raw_content is optional text storing original feature.yaml for dashboard editing/export
            3: requirements array is required when spec present; must not be empty; not allowed when spec absent
            4: Each requirement must have group_key, group_type (COMPONENT|CONSTRAINT), local_id, and definition
            5: "Optional requirement fields: parent_local_id, note, is_deprecated, replaced_by (array of ACIDs)"
            6: code_references array is optional; each reference must have acid, path (file:line format), is_test (boolean)
            7: At least one of (spec with requirements) or code_references must be present
            8: implementation.name is optional - defaults to branch_name when creating new implementation
            8-1: If implementation already exists and tracks a different branch from this repo, returns 422 with error_code=branch_conflict
            9: inherit_from is optional UUID referencing an existing implementation_id - can be used with or without spec
            9-1: If branch already tracked, inherit_from is ignored (no error)
            10: Returns 422 with error_code=duplicate_requirement if request contains duplicate (group_key, local_id)

    RESPONSE_FORMAT:
        name: Response format and errors
        requirements:
            1: All responses use snake_case JSON field names
            2: Error responses include error_code string and message field
            3: Returns 400 for malformed JSON, missing required fields, or spec/requirements/refs all absent
            4: Returns 422 for semantic validation errors (invalid group_type, malformed ACID, invalid replaced_by, branch_conflict)

    TX:
        name: Transaction guarantees
        requirements:
            1: All database operations within a single push are atomic (single transaction)
            2: On failure, entire push is rolled back - no partial state
            3: Concurrent pushes to the same spec use last-write-wins semantics

    COMPAT:
        name: API compatibility
        requirements:
            1: API versioned at /api/v1/push
            2: ACIDs must match format feature-name.GROUP_KEY.local_id
            3: Backward compatibility maintained - new optional fields can be added without breaking existing clients
