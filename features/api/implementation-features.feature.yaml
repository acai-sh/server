feature:
    name: implementation-features
    product: api
    version: 1.0.0
    description: |
        The implementation-features endpoint returns a worklist of features available to one implementation.
        It gives AI agents and CI a lightweight way to discover what exists and what may need attention.

components:
    ENDPOINT:
        description: HTTP interface
        requirements:
            1: "GET /api/v1/implementation-features"
            2: Requires Authorization Bearer token header

    REQUEST:
        description: Query parameters for feature discovery within one implementation
        requirements:
            1: Requires `product_name` string
            2: Requires `implementation_name` string
            3: Accepts optional `changed_since_commit` string
            3-note: Filters to features whose canonical spec `last_seen_commit` differs from the provided commit

    DISCOVERY:
        description: How features are discovered and summarized
        requirements:
            1: Lists features that resolve for the selected implementation, including features inherited from ancestors
            2: Each feature is represented once using its canonical spec for that implementation
            3: When multiple tracked branches on the selected implementation contain the same feature, the local spec with the most recent `updated_at` timestamp is the canonical spec for that feature
            4: Ref counts aggregate refs across all tracked branches for the implementation, falling back to the nearest ancestor implementation only when no refs exist locally
            5: `changed_since_commit` compares against the canonical spec selected by this endpoint, including inherited canonical specs
            6: If multiple local specs have the same most recent `updated_at`, the canonical spec is the one with the lexicographically smallest branch name

    RESPONSE:
        description: The response shape for implementation worklists
        requirements:
            1: "On success, returns HTTP 200 with a JSON body containing a `data` object"
            2: "The `data` object includes `product_name`, `implementation_name`, and `implementation_id`"
            3: "The `data` object includes a `features` list sorted by feature name"
            4: Each feature entry includes `feature_name`, `description`, `refs_count`, and `test_refs_count`
            5: Each feature entry includes `has_local_spec`, `spec_last_seen_commit`, and `refs_inherited`
            6: "On validation error, returns HTTP 422 with an `errors` object containing a `detail` string"
            7: "If the product or implementation cannot be found, returns HTTP 404 with an `errors` object containing a `detail` string"
            8: "On auth error, returns HTTP 401 with an `errors` object containing a `detail` string"
            9: "On scope or permission error, returns HTTP 403 with an `errors` object containing a `detail` string"

constraints:
    AUTH:
        requirements:
            1: Requires a valid, non-expired, non-revoked API token
            2: Token scopes must include `impls:read`, `specs:read`, and `refs:read`
            3: All lookups are scoped to the token's team_id

    VALIDATION:
        requirements:
            1: "`product_name` and `implementation_name` are required"
            2: The endpoint is read-only and returns summaries, not full ACID definitions
