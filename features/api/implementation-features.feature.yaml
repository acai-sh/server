feature:
    name: implementation-features
    product: api
    version: 1.0.0
    description: |
        The implementation-features endpoint returns a worklist of features available to one implementation.
        It gives AI agents and CI a lightweight way to discover what exists, what looks incomplete, and what may need attention.

components:
    ENDPOINT:
        description: HTTP interface
        requirements:
            1: "GET /api/v1/implementation-features"
            2: Requires Authorization Bearer token header

    REQUEST:
        description: Query parameters for feature discovery within one implementation
        requirements:
            1: Requires `product_name` string
            2: Requires `implementation_name` string
            3: Accepts optional `statuses` list of valid state values, including `null`
            4: Accepts optional `changed_since_commit` string
            4-note: Filters to features whose canonical spec `last_seen_commit` differs from the provided commit

    DISCOVERY:
        description: How features are discovered and summarized
        requirements:
            1: Lists features that resolve for the selected implementation, including features inherited from ancestors
            2: Each feature is represented once using its canonical spec for that implementation
            3: When multiple tracked branches on the selected implementation contain the same feature, the local spec with the most recent `updated_at` timestamp is the canonical spec for that feature
            4: Completion counts use the resolved states for that implementation, inheriting from the nearest ancestor row when no local row exists
            5: Ref counts aggregate refs across all tracked branches for the implementation, falling back to the nearest ancestor implementation only when no refs exist locally
            6: When `statuses` is provided, a feature is included only if at least one of its resolved ACIDs has a matching status

    RESPONSE:
        description: The response shape for implementation worklists
        requirements:
            1: "On success, returns HTTP 200 with a JSON body containing a `data` object"
            2: "The `data` object includes `product_name`, `implementation_name`, and `implementation_id`"
            3: "The `data` object includes a `features` list sorted by feature name"
            4: Each feature entry includes `feature_name`, `description`, `completed_count`, and `total_count`
            5: Each feature entry includes `refs_count`, `test_refs_count`, `has_local_spec`, and `has_local_states`
            6: Each feature entry includes `spec_last_seen_commit`
            7: Each feature entry includes `states_inherited` boolean and `refs_inherited` boolean
            8: "On validation error, returns HTTP 422 with an `errors` object containing a `detail` string"
            9: "If the product or implementation cannot be found, returns HTTP 404 with an `errors` object containing a `detail` string"
            10: "On auth error, returns HTTP 401 with an `errors` object containing a `detail` string"
            11: "On scope or permission error, returns HTTP 403 with an `errors` object containing a `detail` string"

constraints:
    AUTH:
        requirements:
            1: Requires a valid, non-expired, non-revoked API token
            2: Token scopes must include `impls:read`, `specs:read`, `states:read`, and `refs:read`
            3: All lookups are scoped to the token's team_id

    VALIDATION:
        requirements:
            1: "`product_name` and `implementation_name` are required"
            2: "`statuses` accepts only `null`, `assigned`, `blocked`, `incomplete`, `completed`, `rejected`, and `accepted`"
            3: The endpoint is read-only and returns summaries, not full ACID definitions
