feature:
    name: impl-branches
    description: /implementations/:implementation_id/branches for managing an implementation's tracked branches
    product: api

components:
    RESOURCE:
        name: Branches resource
        description: Base URL for branch management operations
        requirements:
            1: All branch endpoints are at /api/v1/implementations/:implementation_id/branches

    TRACK_BRANCH:
        name: Track branch
        description: Link a git branch to an implementation with override semantics
        requirements:
            1: POST accepts repo_uri and branch_name in request body
            2: Creates tracked_branch record if new, returns 200 OK if already exists (idempotent)
            3: If a different branch from the same repo is tracked, returns 409 Conflict with error_code=branch_override_required and current_branch in response
            4: If a different branch from the same repo is tracked and ?override=true, deletes old tracked_branch (cascades to code_references) and creates new one
            4-note: Supports feature branch workflows where you switch from dev to feat-x
            5: Returns tracked_branch_id and overridden_branch name (null if no override)

    LIST_BRANCHES:
        name: List branches
        description: Retrieve all branches tracked by an implementation
        requirements:
            1: GET returns array of tracked_branch objects
            2: Each tracked_branch includes id, repo_uri, branch_name, created_at, updated_at

    UNTRACK_BRANCH:
        name: Untrack branch
        description: Remove a tracked branch from an implementation
        requirements:
            1: DELETE /:repo_uri removes the tracked branch (cascades to code_references)
            2: Returns 204 No Content on success

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: All endpoints require valid Bearer token (rejects revoked or expired tokens)
            2: Read operations require impls:read scope, write operations require impls:write scope
            3: Token's team_id must match implementation.team_id - returns 404 if mismatch (not 403, to avoid leaking existence)

    VALIDATION:
        name: Input validation
        requirements:
            1: repo_uri and branch_name must be non-empty strings
            2: Returns 400 for malformed requests, 422 for invalid characters
            3: repo_uri in URL paths must be URL-encoded (e.g., github.com%2Facme%2Fbackend)
