feature:
    name: states
    description: |
        The states endpoint provides read and write access to acceptance states for implementations.
        States track acceptance progress for features within an implementation's environment.
    version: 1.0.0
    product: api
    draft: true

components:
    ENDPOINT:
        description: HTTP interface
        requirements:
            1: "POST /api/v1/states — write or update states"
            2: "GET /api/v1/states — read states for an implementation"
            3: Content-Type application/json
            4: Requires Authorization Bearer token header

    POST_REQUEST:
        description: Describes the request body shape for writing states
        requirements:
            1: Requires `repo_uri` string
            2: Requires `branch_name` string
            3: Requires `implementation_name` string
            4: Accepts optional `override` boolean, default false, which indicates if the states should override rather than merge
            4-note:
                Default false because we assume the state updates are partial.
                In the db we store states in buckets, grouped by feature + implementation. `true` would reset any bucket that is touched.
            5: Requires `states` object
            5-1: |
                `states` contains a map of ACIDs to state objects e.g. `{ "my-feature.MAIN.1-1": { status: "completed", comment: "High priority for QA" } }`
            5-2: Each state object requires a nullable `status` string, supported strings are defined in data-model.FEATURE_IMPL_STATES.4-3
            5-3: Each state object accepts an optional `comment` string
            6: States can contain any ACID for any feature, including non-existent features, and they are always persisted as long as the format is valid

    WRITE_STATES:
        description: When states are written or inherited
        requirements:
            1: States can only be written when the branch is tracked by an implementation (states require an implementation to attach to)
            1-note: If the branch is not tracked, the request is rejected with a helpful error.
            2: On first push of states for a given feature_name + implementation, states are snapshotted from the parent implementation (if one exists) then merged with the incoming states
            2-note: First push means the first time a feature_impl_states row is created for this (implementation_id, feature_name) combination. Incoming states take precedence over snapshotted parent states.
            3: On subsequent pushes, incoming states are patched into the existing states (merge, incoming wins on key collision)
            3-note: Under the hood the app is grouping ACIDs by feature_name and writing each group to a feature_impl_states row
            4: The system silently allows dangling states (e.g. ACIDs that don't map to an actual spec)

    GET_REQUEST:
        description: Describes the query parameters for reading states
        requirements:
            1: Requires `implementation_name` string
            2: Requires `repo_uri` string
            3: Requires `branch_name` string
            4: Accepts optional `feature_name` string to filter states by feature

    GET_RESPONSE:
        description: The response shape for reading states
        requirements:
            1: "On success, returns HTTP 200 with a JSON body containing a `data` object"
            2: "The `data` object is a map of ACIDs to state objects, each containing `status` (nullable string) and `comment` (nullable string)"
            3: "On validation error, returns HTTP 422 with an `errors` object containing a `detail` string"
            4: "On auth error, returns HTTP 401 with an `errors` object containing a `detail` string"
            5: "On scope/permission error, returns HTTP 403 with an `errors` object containing a `detail` string"

    POST_RESPONSE:
        description: The response shape for writing states
        requirements:
            1: "On success, returns HTTP 200 with a JSON body containing a `data` object"
            2: "The `data` object includes: `implementation_name` (string), `implementation_id` (string), `branch_id` (string)"
            3: "The `data` object includes `states_written` (integer) count"
            4: "The `data` object includes a `warnings` list of human-readable strings for non-fatal issues (e.g. dangling states)"
            5: "On validation error, returns HTTP 422 with an `errors` object containing a `detail` string"
            6: "On auth error, returns HTTP 401 with an `errors` object containing a `detail` string"
            7: "On scope/permission error, returns HTTP 403 with an `errors` object containing a `detail` string"

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: States read requires a valid, non-expired, non-revoked API token
            2: States write requires a valid, non-expired, non-revoked API token
            3: Token scopes must include states:read for state reads
            4: Token scopes must include states:write for state writes
            5: The token's team_id determines ownership of all created resources
            6: All implementation, product, and branch lookups are scoped to the token's team_id

    TX:
        name: Transaction guarantees
        requirements:
            1: All operations within a state write are atomic; any failure rolls back the entire write
            2: Concurrent writes to the same implementation use last-write-wins semantics

    VALIDATION:
        name: Validation constraints
        requirements:
            1: Implementation must exist and be tracked by the given branch
            2: All ACIDs in the states map must follow the correct format (feature.COMPONENT.requirement)
