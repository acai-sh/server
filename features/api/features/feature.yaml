feature:
    name: features
    description: /features resource for browsing features and their versions derived from pushed specs
    product: api

components:
    RESOURCE:
        name: Features resource
        description: Base URL for feature operations
        requirements:
            1: All feature endpoints are at /api/v1/features

    LIST:
        name: List features
        description: Retrieve all features for the authenticated team
        requirements:
            1: GET returns array of features derived from specs grouped by feature_name
            2: Accepts optional query param ?product=acai.sh to filter by product
            3: Each feature includes name, product, description, latest_version, versions_count, implementations_count, last_push_at
            4: Features are ordered alphabetically by name
            5: description comes from the latest version's feature_description

    GET:
        name: Get feature
        description: Retrieve a single feature with version and implementation details
        requirements:
            1: GET /:feature_name returns feature details
            2: Includes name, product, description
            3: Includes versions array with version, spec_id, implementations_count, last_push_at for each spec version
            4: Includes implementations array with id, name, spec_id, spec_version for all implementations pointing to any version of this feature
            5: Versions are ordered by semantic version descending (latest first)
            6: Returns 404 if feature_name not found in team's specs

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: All endpoints require valid Bearer token (rejects revoked or expired tokens)
            2: Read operations require specs:read scope
            3: All data is scoped to token's team_id

    VALIDATION:
        name: Input validation
        requirements:
            1: feature_name in path must be url-safe (alphanumeric, hyphens, underscores)
            2: Returns 404 for invalid or non-existent feature_name
