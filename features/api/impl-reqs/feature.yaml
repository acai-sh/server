feature:
    name: impl-reqs
    description: "/implementations/:implementation_id/requirements for viewing requirements and updating their statuses"
    product: api

components:
    LIST:
        name: List requirements
        description: Retrieve all requirements with their statuses for an implementation
        requirements:
            1: GET returns array of requirements from the implementation's spec
            2: Each requirement includes acid, group_key, group_type, local_id, parent_local_id, definition, note, is_deprecated, replaced_by
            3: Each requirement includes status and status_note from requirement_statuses table
            4: Requirements are ordered by group_key, then local_id

    UPDATE_STATUS:
        name: Update single status
        description: Update the status of a single requirement
        requirements:
            1: PATCH /:acid accepts JSON body with status (required) and note (optional)
            2: Status must be a non-empty string (e.g., TODO, IN_PROGRESS, IMPLEMENTED, ACCEPTED)
            3: Validates that the ACID belongs to this implementation's spec - returns 404 if not found
            4: Upserts requirement_statuses record for this (implementation_id, requirement_id)
            5: Returns 200 OK with updated requirement object

    BATCH_UPDATE:
        name: Batch update statuses
        description: Update statuses for multiple requirements in a single request
        requirements:
            1: POST accepts JSON body with statuses array
            2: Each item in statuses array contains acid (required), status (required), note (optional)
            3: Validates all ACIDs belong to this implementation's spec - returns 400 with list of invalid ACIDs if any fail
            4: Transactional - all updates succeed or none are applied
            5: Returns 200 OK with count of updated requirements

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: All endpoints require valid Bearer token (rejects revoked or expired tokens)
            2: Read operations require impls:read scope, write operations require impls:write scope
            3: Token's team_id must match implementation.team_id - returns 404 if mismatch (not 403, to avoid leaking existence)

    VALIDATION:
        name: Input validation
        requirements:
            1: ACID must be a valid ACID format (feature-name.GROUP_KEY.local_id)
            2: Status must be a non-empty string
            3: Returns 400 for malformed requests
