feature:
    name: push
    description: |
        The push endpoint is the primary write API for the acai CLI.
        It ingests multiple specs, code references, states, and git metadata in a single json payload.
        It can be used to update existing product implementations (for example, updates to Production when specs change or code has been refactored)
        It can also be used to create a new implementation, with inheritence semantics (for example, when branching from Staging to work on a new spec or fix an existing one)
    version: 1.0.0
    product: api

components:
    REQUEST:
        description: Describes the top level request body shape
        requirements:
            1: Requires `repo_uri` string
            2: Requires `branch_name` string
            3: Requires `commit_hash` string
            4: Accepts optional `specs` list of spec objects
            4-1: Each requires `feature` object (see FEAT)
            4-2: Each requires `requirements` object (see REQS)
            5: Accepts optional `references` map
            5-1: Contains a map of ACIDs to Ref Objects (see REF)
            6: Accepts optional `states` map
            6-1: Contains a map of ACIDs to State objects (see STATE)
            6-2: Can contain any ACID for any spec, unsorted. Silently accepts non-existant ACIDs
            7: Accepts optional `target_impl_name` string
            9: Accepts optional `parent_impl_name` string

    FEAT:
        description: The shape of the `feature` object contained in a spec object
        requirements:
            1: Requires `name` string
            2: Requires `product` string
            3: Accepts optional `description` string
            4: Accepts optional `version` string
            5: Accepts optional `prerequisites` list of strings

    REQS:
        description: The `requirements` object contained in a spec object (see REQUEST)
        requirements:
            1: Contains a map of ACIDs to Definition objects. Each definition object contains...
            1-1: Required `requirement` string
            1-2: Optional `deprecated` boolean
            1-3: Optional `note` string
            1-4: Optional `replaced_by` list of strings

    REF:
        description: A Ref Object keyed on an ACID in the `references` map in a request
        requirements:
            1: Requires `paths` list of strings e.g. `path/from/root.exs:102`

    STATE:
        description: The state object keyed on an ACID in the `states` map in a request
        requirements:
            1: Requires nullable `status` tag which is one of `null` or `"assigned|blocked|completed|rejected|accepted"
            2: Accepts `comment` string

    INSERT_SPEC:
        description: When new spec records are created
        requirements:
            1: Inserts a new spec record when it is the first time that spec has been pushed from this branch
            2: Rejects the entire transaction if the spec can not be inserted
            2-note: See data-model.SPECS.14-1 and data-model.SPECS.15 for db level uniqueness constraints
            2-1: On version clash, returns helpful error 'The system tried to insert a new spec, but failed because this feature + version was already pushed for this product. Change the feature version, or product, or name before trying again.'
            2-1-note: This is most likely to happen when the user pushes an existing spec from a new branch, but forgot to change the `feature.version`
            2-2: On feature name clash, returns helpful error message - 'Something went wrong. The system tried to insert a new spec, but failed because this branch already has a feature with this name.'
            2-2-note: This should never happen, we should be performing updates in this case.

    UPDATE_SPEC:
        description: When existing spec records are updated
        requirements:
            1: Updates an existing spec record when this branch already has a feature with this name
            2: Accepts changes to version, path, description, raw_content, and requirements
            3: requirements map is never merged with past versions, it is always overwritten completely.

    WRITE_STATES:
        description: When states are written, inherited, or overwritten
        requirements:
            1: On first push of states, states are snapshotted from a parent (if possible) then merged with incoming states
            1-note: "First push is defind as the first time any single ACID appears for feature_name + this implementation"
            2: On subsequent pushes, states are simply patched
            2-note: Under the hood the app is grouping ACIDs by feature_name and writing each group to a feature_impl_states row
            3: The system silently allows dangling states (e.g. even if feature-name does not map to an actual spec)

    PERMANENCE:
        description: Semantics what can be undone and what can not
        requirements:
            1: If I accidentally overwrite a spec (e.g. if I accidentally copy paste a feature name), related states and refs are not destroyed.
            1-note: Dangling states and refs are persisted, even if the spec is altered/removed. I could still fetch dangling states directly by feature-name.
            2: State and ref overwrites and deletions are permanent and do not have any explicit undo semantics.
            2-note: For refs and specs you can just re-push since they are derived from your codebase.

    IMPLS:
        description:
            When implementations (and products) are created, updated, or linked on push.
            To keep this simple for MVP, I am going to assume that re-linking, changing inheritance, and other mutations are done via the frontend only.
            There is no auto-inheritance for MVP-- it must be specified.
        requirements:
            # Happy path 1 - pushing anything (a spec, a ref, or a state) on an untracked branch
            1: Creates a new implementation when the requested `repo_uri`+`branch_name` is not already associated with a tracked branch for any implementation
            1-1: This is true regardless of payload (if any ref, spec, or state is included in the request)
            1-2: Names the implementation after the `branch_name` unless `target_impl_name` is included
            1-3: I can push states and refs even if the implementation does not have any specs or parents.
            # happy path 2 - brand new products on any tracked or untracked branch
            2: Creates new `product` record if the request contains a spec that contains a never-before-seen `feature.product` key
            # happy path 3 - new feature on a new branch, inheriting from a parent
            # happy path 4 - mutated spec on a new branch, inheriting from a parent
            # happy path 5 - only edited refs on a new branch
            # new backend branch linking to another implementation
            # multi-product / multi-feature push
            # sad path - missing product, can't create impl without product
            # sad path - Rejects if the implementation name is already taken and can't be linked (We already have a db constraint that prevents linking two branches from the same repo)
            # - # Helpful error message; 'The implementation name you provided could not be configured to track this branch,
            # most likely because it already tracks a different branch in this repo. If you want to create a new implementation linked to this branch instead,
            # choose a unique `implementation_name`. Note, if no `implementation_name` is provided, the system will use `branch_name` as the implementation name.'
            # Implementation naming is all-or-nothing. You can only pass in one implementation name (or one branch name). If you want to create 2 implementations on push, do separate requests.

    REF_PUSH:
        name: Code reference push
        description: |
            Pushing code references links ACIDs to implementation locations.
            References are scoped to a spec + implementation combination.
        requirements:
            1: Push overwrites all existing refs for the spec + implementation with the new set.
            2: References include repo, file path, line/column location, and whether it's a test.
            3: Invalid or unknown ACIDs in the push are skipped and reported.
            4: Refs can be pushed independently of specs (common in multi-repo setups).

    STATES_PUSH:
        name: States push
        description: |
            Pushing a states map allows setting ACID statuses directly.
            States are merged into the spec_impl_states JSONB column.
        requirements:
            1: States map keys are full ACID strings.
            2: States map values include status, optional comment, and optional metadata.
            3: Pushed states are merged with existing states, overwriting on key collision.
            4: States pushed to an inherited implementation overwrite inherited snapshotted values.
            5: States can be pushed independently of specs and refs.

    IDEMPOTENCY:
        name: Push idempotency
        description: |
            Push operations are idempotent - re-running the same push produces the same result.
            Different pushes to the same implementation compose predictably.
        requirements:
            1: Pushing the same spec content multiple times is a no-op after the first.
            2: Pushing without inheritance, then pushing with inheritance, adds the parent and snapshots.
            3: Pushing with inheritance, then pushing without inheritance, keeps the parent unchanged.
            4: Pushing with inheritance, then pushing with parent null, removes the parent (uninherit).
            5: Forgotten states can be added in subsequent pushes via the states map.
            6: Forgotten inheritance can be added in subsequent pushes by setting parent.

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: Push requires a valid, non-expired, non-revoked API token.
            2: Token scopes must include specs:write for spec pushes.
            3: Token scopes must include refs:write for reference pushes.
            4: Token scopes must include impls:write for creating implementations.
            5: The token's team_id determines ownership of all created resources.

    TX:
        name: Transaction guarantees
        requirements:
            1: All operations within a push are atomic; failures roll back entirely.
            2: Concurrent pushes to the same spec use last-write-wins semantics.

    VALIDATION:
        name: Validation constraints
        requirements:
            1: Feature names must only contain alphanumeric chars, hyphens, and underscores.
            2: Version strings must follow SemVer format when provided.
            3: Duplicate (feature_name, feature_version) combinations are rejected across branches.
