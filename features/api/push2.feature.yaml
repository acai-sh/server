feature:
    name: push
    description: |
        The push endpoint is the primary write API for the acai CLI.
        It ingests multiple specs, code references, states, and git metadata in a single json payload.
        It can be used to update existing product implementations (for example, updates to Production when specs change or code has been refactored)
        It can also be used to create a new implementation, with inheritence semantics (for example, when branching from Staging to work on a new spec or fix an existing one)
    version: 1.0.0
    product: api
    draft: true

components:
    REQUEST:
        description: Describes the top level request body shape
        requirements:
            1: Requires `repo_uri` string
            2: Requires `branch_name` string
            3: Requires `commit_hash` string
            4: Accepts optional `specs` list of spec objects
            4-note: "Example - `[{ feature, requirements, meta }, { feature, requirements, meta }]`"
            4-1: Each requires `feature` object (see FEAT)
            4-2: Each requires `requirements` object (see REQS)
            4-3: Each requires `meta` object (see FEAT_META)
            5: Accepts optional `references` map (see REFS)
            6: Accepts optional `states` map (see STATES)
            7: Accepts optional `target_impl_name` string
            7-note: All specs must belong to the same product as the target implementation
            9: Accepts optional `parent_impl_name` string
            9-note: All specs must belong to the same product as the parent implementation

    FEAT:
        description: The shape of the `feature` object contained in a spec object
        requirements:
            1: Requires `name` string
            2: Requires `product` string
            3: Accepts optional `description` string
            4: Accepts optional `version` string
            5: Accepts optional `prerequisites` list of strings

    FEAT_META:
        description: The shape of the `meta` object contained in a spec object
        requirements:
            1: Requires `path` string
            2: Accepts optional `raw_content` string
            3: Requires `last_seen_commit` string

    SPEC_REQS:
        description: The `requirements` object contained in a spec object (see REQUEST)
        requirements:
            1: Contains a map of ACIDs to Definition objects. Each definition object contains...
            1-1: Required `requirement` string
            1-2: Optional `deprecated` boolean
            1-3: Optional `note` string
            1-4: Optional `replaced_by` list of strings

    REFS:
        description: The `references` top level property
        requirements:
            1: Accepts optional `override` boolean, default false, which indicates if the refs should override rather than merge
            1-note:
                Default false because we assume the push was partial (only some refs from some files on the branch).
                In the db we store refs in buckets, grouped by feature + branch. `true` would reset any bucket that is touched.
            2: Requires `data` object
            2-1: |
                `data` contains a map of ACIDs to objects e.g. `{ "my-feature.MAIN.1-1": [{ path: "path/from/root.exs:102", is_test: false }] }`
            2-2: objects require a `path` string, and optional `is_test` boolean (default false)
            2-4: refs can contain any ACID for any spec, unsorted, even for non-existant features, and they are always persisted as long as the format is valid.

    STATES:
        description: The `states` top level property
        requirements:
            1: Accepts optional `override` boolean, default false, which indicates if the states should override rather than merge
            1-note:
                Default false because we assume the state updates are partial.
                In the db we store states in buckets, grouped by feature + impl. `true` would reset any bucket that is touched.
            2: Requires `data` object
            2-1: |
                `data` contains a map of ACIDs to objects e.g. `{ "my-feature.MAIN.1-1": [{ status: "completed", comment: "High priority for QA" }] }`
            2-2: objects require a nullable `status` string, which is one of `null` or `"assigned|blocked|incomplete|completed|rejected|accepted"
            2-3: objects accept an optional `comment` string
            2-4: Can contain any ACID for any spec, unsorted, even for non-existant features, and they are always persisted as long as the format is valid.

    INSERT_SPEC:
        description: When new spec records are created
        requirements:
            1: Inserts a new spec record when it is the first time that spec has been pushed from this branch
            2: On version clash, returns helpful error 'The system tried to insert a new spec, but failed because this feature + version was already pushed for this product. Change the feature version, or product, or name before trying again.'
            2-note: This is most likely to happen when the user pushes an existing spec from a new branch, but forgot to change the `feature.version`
            3: On feature name clash, returns helpful error message - 'Something went wrong. The system tried to insert a new spec, but failed because this branch already has a feature with this name.'
            3-note: This should never happen, we should be performing updates in this case.

    UPDATE_SPEC:
        description: When existing spec records are updated
        requirements:
            1: Updates an existing spec record when this branch already has a feature with this name
            2: Accepts changes to version, path, description, raw_content, and requirements
            3: requirements map is never merged with past versions, it is always overwritten completely.

    WRITE_STATES:
        description: When states are written, inherited, or overwritten
        requirements:
            1: On first push of states, states are snapshotted from a parent (if possible) then merged with incoming states
            1-note: "First push is defind as the first time any single ACID appears for feature_name + this implementation"
            2: On subsequent pushes, states are simply patched
            2-note: Under the hood the app is grouping ACIDs by feature_name and writing each group to a feature_impl_states row
            3: The system silently allows dangling states (e.g. even if feature-name does not map to an actual spec)

    PERMANENCE:
        description: Semantics what can be undone and what can not
        requirements:
            1: If I accidentally overwrite a spec (e.g. if I accidentally copy paste a feature name), related states and refs are not destroyed.
            2: State and ref overwrites and deletions are permanent and do not have any explicit undo semantics.
            2-note: For refs and specs you can just re-push since they are derived from your codebase.

    NEW_IMPLS:
        description:
            Semantics for when implementations (and products) are created
            To keep this simple for MVP, I am going to assume that re-linking, changing inheritance, and other mutations are done via the frontend only.
            There is no auto-inheritance for MVP-- it must be specified.
        requirements:
            # Happy path 1 - pushing anything (a spec, a ref, or a state) on an untracked branch
            1: Creates a new implementation when a spec is pushed, and the requested `repo_uri`+`branch_name` is not already associated with a tracked branch for any implementation
            1-1: Names the implementation after the `target_impl_name`, fallback to `branch_name`
            1-note: Exception for linking when the target_impl_name exists and can be linked (see LINK_IMPLS)
            2: Reject if specs are omitted, and the branch is not tracked, and no parent_impl_name is provided, as we can not create a new implementation because we don't know what product it's for.
            2-1: The user should get a helpful error message asking them to provide one of the above.
            3: Creates new `product` record for each spec that contains a never-before-seen `feature.product` key
            4: Rejects multi-product push when target_impl_name or parent_impl_name is provided

    LINK_IMPLS:
        description:
            In some cases we can safely link an untracked branch to an existing implementation (to insert a tracked_branches record).
            This is a different workflow from branching off an implementation, in which case I would want a new child implementation.
            This is useful if I've spun up a new repo (backend, microservice, etc) and am integrating it into a product for the first time.
            We want to avoid accidental linking, for example, if two impls share the same name, or if for some reason I passed a target impl.
        requirements:
            1: A branch is linked only if the branch_name is not already tracked by an imlp, and the target_impl_name is provided, and the target_impl is not already linked to a branch in this repo_uri, and

    EXISTING_IMPLS:
        description: In most cases we are pushing refs, or states, or spec changes to an existing implementation (Prod, Staging, etc)
        requirements:

    PARENTS:
        description:
            The user can create a new implementation that inherits from a parent.
            For MVP, this can't be used to update an existing implementation-- only new ones.
        requirements:
            1: If my push would create a new impl. (see NEW_IMPLS), I can optionally provide a `parent_impl_name` to configure inheritance
            2: If `parent_impl_name` is not provided, new implementations will not inherit (there is no auto-inheritance heuristic)

    REFS_PUSH:
        requirements:
            1: Push overwrites all existing refs for the spec + branch with the new set.
            2: References include repo, file path, line/column location, and whether it's a test.
            3: Invalid or unknown ACIDs in the push are skipped and reported.
            4: Refs can be pushed independently of specs (common in multi-repo setups).

    IDEMPOTENCY:
        name: Push idempotency
        description: |
            Push operations are idempotent - re-running the same push produces the same result.
            Different pushes to the same implementation compose predictably.
        requirements:
            1: Pushing the same spec content multiple times is a no-op after the first.
            2: Pushing without inheritance, then pushing with inheritance, adds the parent and snapshots.
            3: Pushing with inheritance, then pushing without inheritance, keeps the parent unchanged.
            4: Pushing with inheritance, then pushing with parent null, removes the parent (uninherit).
            5: Forgotten states can be added in subsequent pushes via the states map.
            6: Forgotten inheritance can be added in subsequent pushes by setting parent.

constraints:
    AUTH:
        name: Authentication and authorization
        requirements:
            1: Push requires a valid, non-expired, non-revoked API token.
            2: Token scopes must include specs:write for spec pushes.
            3: Token scopes must include refs:write for reference pushes.
            4: Token scopes must include impls:write for creating implementations.
            5: The token's team_id determines ownership of all created resources.

    TX:
        name: Transaction guarantees
        requirements:
            1: All operations within a push are atomic; failures (e.g. uniqueness conflicts, errors) roll back entirely.
            2: Concurrent pushes to the same spec use last-write-wins semantics.

    VALIDATION:
        name: Validation constraints
        requirements:
            1: Feature names must only contain alphanumeric chars, hyphens, and underscores.
            2: Version strings must follow SemVer format when provided.
            3: Duplicate (feature_name, feature_version) combinations are rejected across branches.
            4: If target_impl_name is provided, all specs must belong to the same product as the target implementation.
            5: If parent_impl_name is provided, all specs must belong to the same product as the parent implementation.
