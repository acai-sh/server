feature:
    name: feature-view
    description: The /t/:team_name/f/:feature_name view listing all implementations of a single feature.
    prerequisites:
        - data-model.SPECS
        - data-model.IMPLS
        - data-model.REQ_STATUSES
        - product-view

components:
    MAIN:
        name: Main requirements for the /t/:team_name/f/:feature_name view
        requirements:
            1: Renders the feature name
            2: Renders the feature description if one exists
            3: Renders a grid of implementation cards, one per active implementation of this feature
            3-1: If no implementations exist, an empty state is shown
            4: Each implementation card navigates to /t/:team_name/f/:feature_name/i/:impl_slug on click

    IMPL_CARD:
        name: A card summarising a single implementation of the feature
        requirements:
            1: Renders the implementation name
            2: Renders the count of tracked branches linked to this implementation
            3: Renders the total count of requirements for the feature's spec
            4: Renders a progress bar broken into three segments, proportional to requirement status counts
            4-1: Green segment represents the proportion of requirement_statuses with status 'accepted'
            4-2: Blue segment represents the proportion with status 'implemented'
            4-3: Gray segment represents the proportion with a null status or no requirement_status row for this implementation
            4-note: For example, 50 accepted + 25 implemented + 25 null out of 100 total renders as 50% green, 25% blue, 25% gray

constraints:
    ROUTING:
        name: Slug-based routing for features
        requirements:
            1: The :feature_name URL segment resolves by matching feature_name on the team's specs (case-insensitive)
            2: If no matching feature is found for the team, the user is redirected to /t/:team_name
