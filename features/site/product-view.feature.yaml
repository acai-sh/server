feature:
    name: product-view
    key: PRODUCT_VIEW
    product: site
    description: Matrix view showing feature availability across all implementations in a product.
    prerequisites:
        - data-model.PRODUCTS
        - data-model.SPECS
        - data-model.IMPLS
components:
    MATRIX:
        name: Feature availability matrix
        requirements:
            1: Columns are active implementations in the product.
            2: Rows are distinct feature_names from specs attached to this product.
            3: Cells show whether the feature is available to the implementation.
            4: Available cells link to the feature-impl page.
            5: Clicking a row navigates to the feature view.
            6: Empty state shown if product has no features or implementations.
            7: Clicking a cell navigates to that feature-impl (feature-impl-view.ROUTING.1)
            8: Unavailable cells render `n/a`

    PRODUCT_SELECTOR:
        name: Product dropdown
        requirements:
            1: Dropdown lists all products in the current team.
            2: Changing selection patches URL via handle_params without full navigation.

constraints:
    ROUTING:
        requirements:
            1: Route is /t/:team_name/p/:product_name.
            2: Single batched query fetches all implementations and specs.
