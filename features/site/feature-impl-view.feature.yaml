feature:
    name: feature-impl-view
    product: site
    description: Requirements view for a single feature within a specific implementation.
    prerequisites:
        - data-model.SPECS
        - data-model.IMPLS
        - data-model.FEATURE_IMPL_STATES
        - data-model.FEATURE_BRANCH_REFS
        - feature-view

components:
    MAIN:
        name: Main requirements for the feature-impl view.
        requirements:
            1: Renders feature name and description from spec.
            2: Table columns are ACID, Status, Definition, Refs count.
            2-1: Renders the next nearest ancestor implementation's spec if none exists for this impl.
            3: Status column shows state of this implementation, or of the inherited implementation
            4: Refs column shows total number of code references across all tracked branches for this implementation
            5: Clicking a row opens the requirement details drawer for that ACID.
            6: Co-located with details about the feature and implementation, the user sees a concise summary the inheritance states;
            6-1: If refs are inherited
            6-2: If states are inherited
            6-3: If the spec and spec requirements are inherited
            6-note: Consider badges and tooltips here

    IMPL_SELECTOR:
        name: Implementation dropdown
        requirements:
            1: Dropdown lists all active implementations in the product.
            2: Changing selection patches URL via handle_params without full navigation.

    DRAWER:
        name: Requirement details drawer
        requirements:
            1: Opens when a requirement row is clicked.
            2: Shows ACID as title, full definition text, and note if present.
            3: Shows status and comment from feature_impl_states.states for this ACID.
            4: Lists all refs from feature_branch_refs.refs for this ACID, aggregated across all tracked branches for this implementation.
            4-note: Each ref is sourced from a specific branch. Consider showing which branch each ref comes from.
            5: Each ref renders as clickable link to source file at the specific line.
            6: Test refs visually distinguished from non-test refs.
            7: Drawer dismisses without navigation.

constraints:
    ROUTING:
        requirements:
            1: Route is /t/:team_name/i/:impl_name-:impl_id/f/:feature_name.
            2: impl_name is sanitized and trimmed for URL safety.
            3: impl_id is the UUID used for lookup.
            4: feature_name matches spec.feature_name scoped to implementation tracked branches.

    INHERITANCE:
        requirements:
            1: If spec not found on impl tracked branches, recurse up parent_implementation_id chain.
            2: States are read from feature_impl_states for this implementation. If not found, walk parent chain.
            3: Refs are aggregated from feature_branch_refs across all tracked branches for this implementation. If not found, walk parent chain's tracked branches.
