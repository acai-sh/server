feature:
    name: feature-impl-view
    product: site
    description: Requirements view for a single feature within a specific implementation.
    prerequisites:
        - data-model.SPECS
        - data-model.IMPLS
        - data-model.SPEC_IMPL_STATES
        - data-model.SPEC_IMPL_REFS
        - feature-view

components:
    MAIN:
        name: Requirements table
        requirements:
            1: Renders feature name and description from spec.
            2: Table columns are ACID, Status, Definition, Refs count.
            3: Status column shows state from spec_impl_states.states JSONB for this ACID.
            4: Refs column shows count from spec_impl_refs.refs JSONB array for this ACID.
            5: Clicking a row opens the requirement details drawer for that ACID.

    IMPL_SELECTOR:
        name: Implementation dropdown
        requirements:
            1: Dropdown lists all active implementations in the product.
            2: Changing selection patches URL via handle_params without full navigation.

    DRAWER:
        name: Requirement details drawer
        requirements:
            1: Opens when a requirement row is clicked.
            2: Shows ACID as title, full definition text, and note if present.
            3: Shows status and comment from spec_impl_states.states for this ACID.
            4: Lists all refs from spec_impl_refs.refs for this ACID with repo, path, loc, is_test.
            5: Each ref renders as clickable link to source file at the specific line.
            6: Test refs visually distinguished from non-test refs.
            7: Drawer dismisses without navigation.

constraints:
    ROUTING:
        requirements:
            1: Route is /t/:team_name/i/:impl_name-:impl_id/f/:feature_name.
            2: impl_name is sanitized and trimmed for URL safety.
            3: impl_id is the UUID used for lookup.
            4: feature_name matches spec.feature_name scoped to implementation tracked branches.

    INHERITANCE:
        requirements:
            1: If spec not found on impl tracked branches, recurse up parent_implementation_id chain.
            2: States and refs read from snapshot for this implementation only.
