feature:
    name: work
    product: cli
    version: 1.0.0
    draft: true
    description: |
        The `acai work` command returns a lightweight worklist of features for one implementation.
        It helps AI agents discover what exists and prioritize what to work on next.

components:
    MAIN:
        description: Primary command behavior
        requirements:
            1: Exposes `acai work`
            2: Requires a product selector via `--product` or an equivalent namespaced implementation selector
            3: Accepts optional `--impl <implementation-name>`
            4: Accepts optional `--status <value>` filters, repeatable
            5: Accepts optional `--changed-since-commit <commit>`
            6: Supports `--json` output for machine consumption

    API:
        description: Interaction with the implementation features API
        requirements:
            1: After target resolution, the command calls `GET /api/v1/implementation-features`
            2: The command relays feature completion counts, ref counts, inheritance indicators, and canonical spec commit metadata from the API response

constraints:
    UX:
        requirements:
            1: The default text output prints one line per feature with feature_name, completed_count/total_count, and refs_count
            2: The command is read-only and never mutates specs, refs, or states
