feature:
    name: data-model
    description: |
        Core RDBMS schema for tracking AI-driven feature specifications and code implementation state.
        Fields are default required / non-null unless flagged as Optional.
        Foreign keys are default ON DELETE CASCADE unless flagged otherwise.
    prerequisites:
        - Default elixir/phoenix app already has Users table, session tokens, and mailer logic completed.

components:
    TEAMS:
        name: teams table
        description: Top-level tenant for RBAC and billing.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: name field is a case-insensitive string, non-nullable, and unique within the entire teams table.
            2-1: name field only supports alphanumeric chars, hyphens, and underscores (safe to use in URL path).

    TOKENS:
        name: access_tokens table
        description: Cryptographically hashed tokens granting scoped API access to the team, via a user.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: user_id is a Foreign Key to users table.
            3: name is a string, used for identifying the token's purpose (e.g., "Agentic CLI V1").
            4: token_hash is a string storing the SHA-256 hash of the raw token.
            4-1: token_hash has a UNIQUE constraint, which serves as it's index
            5: token_prefix is a string storing the unhashed prefix (e.g. "at_a1ZkjF")
            6: scopes is a JSONB array of strings defining the permitted API actions.
            6-note: Scopes are simple strings like `<resource>:<action>`
            6-1: "by default, new token scopes are specs:read, specs: write, refs:read, refs:write, impls:read, impls:write, team:read"
            6-2: "token scopes never support tats:admin nor team:admin - for now these scopes are restricted to users with roles"
            7: expires_at is a timestamp indicating when the token naturally invalidates. Optional.
            8: revoked_at is a timestamp for manual, soft-delete invalidation. Optional.
            9: last_used_at is a timestamp updated on successful authentication to track stale tokens. Optional.
            10: team_id is a Foreign Key to teams table.

    ROLES:
        name: user_team_roles table
        description: A pure join table with no primary key. Unique constraint on (team_id, user_id) prevents duplicate role assignments.
        requirements:
            1: team_id is a Foreign Key to teams table.
            2: user_id is a Foreign Key to users table.
            3: title field is a non-nullable string.

    IMPLS:
        name: implementations table
        description: A specific variant of a feature (e.g., Production, Prototype).
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: spec_id is a Foreign Key to specs table.
            3: name is a string (e.g., Production).
            4: description is a text field. Optional.
            5: is_active is a boolean to handle soft-deletes. Defaults to true.
            6: team_id is a Foreign Key to teams table.
            7: Composite Unique Constraint enforces (spec_id, name) - same spec can have many implementations as long as the names differ.

    BRANCHES:
        name: tracked_branches table
        description: A join table that links branches to an implementation (many to many, but no duplicates to the same implementation)
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: implementation_id is a Foreign Key to implementations table, non-nullable.
            3: repo_uri is the normalized URI (e.g., github.com/acai-sh/server or bitbucket.org/acme/api).
            4: branch_name is a string.
            5: Composite Unique Constraint enforces (implementation_id, repo_uri) to prevent the same repo being linked to the same implementation twice.

    SPECS:
        name: specs table
        description: A stored reference to a feature.yaml file at a specific repo, branch, and path.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: repo_uri is the normalized URI (e.g., github.com/acai-sh/server or bitbucket.org/acme/api).
            3: branch_name is a string.
            4: path is text starting from the repo root without a leading slash.
            5: last_seen_commit is a string storing the commit hash from the most recent CLI push.
            6: parsed_at is a timestamp of the most recent parse.
            7: team_id is a Foreign Key to teams table.
            8: feature_name is the string defined under feature.name.
            8-1: feature_name field only supports alphanumeric chars, hyphens, and underscores (safe to use in URL path).
            9: feature_description is the string defined under feature.description. Optional.
            11: feature_version is the string defined under feature.version. Optional.
            12: feature_product is the string defined under feature.product.
            12-1: feature_product field is url-safe (alphanumeric chars, hyphens, and underscores)
            13: Composite Unique Constraint enforces (team_id, repo_uri, branch_name, path) to prevent the same spec being inserted twice. If two users tweak same spec on same branch, last write wins.

    REQS:
        name: requirements table
        description: |
            The parsed, definition-only content of a spec file, keyed to a specific spec. No status lives here.
            Updated via UPSERT on each CLI push. Shared across all implementations that point at the same spec.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: spec_id is a Foreign Key to specs table.
            3: group_key is a string (e.g., FILE, UI).
            4: group_type is an enum restricted to COMPONENT or CONSTRAINT.
            5: local_id is a string (e.g., "1", "2-1").
            6: parent_local_id is a string. Optional. (Only for sub-requirements, e.g., null, or "1", or "2")
            7: definition is a text field.
            8: note is a text field. Optional.
            9: is_deprecated is a boolean.
            10: replaced_by is a JSON array of ACID strings, default empty array.
            11: feature_name is the string defined under feature.name, copied from specs table.
            12: acid is a generated, indexed column concatenating <feature_name>.<group_key>.<local_id>.
            12-note: We include this for quick lookups by ACID, but still the future ability to update reqs by swapping out the feature_name or group_key in an auditable way.
            13: Composite Unique Constraint enforces (spec_id, group_key, local_id).

    REQ_STATUSES:
        name: requirement_statuses table
        description: |
            Per-implementation status for each requirement. Decouples the definition (requirements table) from the
            implementation-specific state pushed by the CLI. Multiple implementations pointing at the same spec
            each maintain their own independent status rows.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: requirement_id is a Foreign Key to requirements table.
            3: implementation_id is a Foreign Key to implementations table.
            4: status is a string, always set by CLI. Defaults to null. Optional.
            5: is_active is a boolean to handle soft-deletes if a requirement is removed from the latest YAML push for this implementation.
            6: last_seen_commit is a string storing the commit hash from which this requirement was last observed for this implementation.
            7: Composite Unique Constraint enforces (implementation_id, requirement_id).
            8: note is a string. Optional.

    REFS:
        name: code_references table
        description: Tracks where a requirement is actively referenced in external codebase repositories.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: requirement_id is a Foreign Key to requirements table. NOT CASCADE - preserved for stale ref detection.
            3: repo_uri is a text field.
            4:
                requirement: branch_name is a text field.
                deprecated: true
                note: this was a mistake, we should have done a foreign key (See data-model.REFS.10)
            5: last_seen_commit is a text field.
            6: acid_string is a text field logging the exact reference found in the code.
            7: last_seen_at is a timestamp updated on each CLI push where the reference is still present, enabling stale ref detection. Optional.
            8: path is a string containing the file path from repo root and the line of code
            9: is_test is a boolean
            10: branch_id is a Foreign Key to branches table
    EVENTS:
        name: activity_events table
        description: Append-only log of meaningful domain events, used to power activity feeds scoped to a team, implementation, or individual requirement.
        requirements:
            1: id field is a UUIDv7 Primary Key.
            2: team_id is a Foreign Key to teams table.
            3: actor_token_id is a Foreign Key to access_tokens table. Optional. Null for system-generated events.
            4: event_type is a non-nullable string identifying the class of event.
            5: subject_type is a non-nullable string identifying the entity kind the event is about (e.g. "spec", "requirement", "implementation").
            6: subject_id is a non-nullable UUID storing the id of the subject entity. Not a foreign key — soft reference preserved across cascading deletes.
            7: batch_id is a UUID grouping related events emitted during the same operation (e.g. a single CLI push). Optional.
            8: payload is a JSONB object carrying event-specific data.
            8-note: Shape varies by event_type
            9: created_at is a non-nullable timestamp. updated_at is intentionally omitted — this table is append-only.

constraints:
    FIELDS:
        requirements:
            1: All tables include created_at and updated_at timestamps managed by Ecto, except activity_events which is append-only and omits updated_at.
            2: Any field in any table that ends with _key must only support url-safe alphanumeric chars, hyphens and underscores. This is to ensure that refs in code are reliably greppable e.g. 'data-model.COMP_2.1-1'
            3: All entities, except for roles, use `id` primary key as UUIDv7

    EVENTS_IDX:
        name: activity_events indexing
        requirements:
            1: Index on (team_id, created_at DESC) to support team-wide activity feeds in reverse-chronological order.
            2: Index on (subject_type, subject_id, created_at DESC) to support feeds scoped to a specific implementation, spec, or requirement.
            3: Index on (batch_id) to support fetching all events belonging to the same operation.
