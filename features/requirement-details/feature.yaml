feature:
    name: requirement-details
    description: |
        A side drawer that opens when a requirement is selected from the implementation view
        (coverage grids or requirements table). Shows the requirement definition, its status
        in the current implementation, and all code references grouped by tracked branch.
    prerequisites:
        - data-model.REQS
        - data-model.REQ_STATUSES
        - data-model.REFS
        - data-model.BRANCHES

components:
    DRAWER:
        name: Requirement details side drawer
        requirements:
            1: Renders the requirement ACID as the drawer title
            2: Renders the full requirement definition text
            3: Renders the requirement note if one exists
            4: Renders the status for this requirement in the currently viewed implementation (read-only)
            4-1: If no status exists, renders a clear 'no status' indicator
            4-2: Renders the implementation name as context label for which implementation the status belongs to
            5: Renders a References section listing all code_references for this requirement
            5-1: Only references whose branch_id (data-model.REFS.10) points to a tracked_branch that belongs to the current implementation are shown
            5-1-note: Unlinked references are excluded — if the branch isn't tracked by this implementation, the ref is not surfaced
            5-2: References are grouped by their tracked branch (branch_id), using the tracked branch repo_uri and branch_name as the group header
            5-3: Each reference within a group displays the file path and line number from data-model.REFS.8 as a clickable link
            5-4: The clickable link is constructed as https://<repo_uri>/blob/<branch_name>/<path>
            5-5: Test references (is_test = true, data-model.REFS.9) are visually distinguished from non-test references within each group
            6: The drawer can be dismissed to return to the underlying view without navigation
